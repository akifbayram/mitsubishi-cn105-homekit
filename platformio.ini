[platformio]
extra_configs = platformio_override.ini

[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.20/platform-espressif32.zip
board = esp32-c6-devkitm-1
framework = arduino
lib_deps =
    HomeSpan/HomeSpan@2.1.5
monitor_speed = 115200
board_build.partitions = partitions.csv
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=0
upload_speed = 921600
extra_scripts = pre:scripts/pre_build.py

[env:nanoc6]
; Generic build — uses #ifndef defaults from branding.h
; To create a branded build, add a new [env:nanoc6-mybrand] section
; in platformio_override.ini (gitignored) with -DBRAND_* flags.
; See include/branding.h for available variables.
