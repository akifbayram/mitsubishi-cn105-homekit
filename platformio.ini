[platformio]
extra_configs = platformio_override.ini
default_envs = nanoc6

; ── Shared configuration ─────────────────────────────────────────────────────
[common]
framework = arduino
lib_deps =
    HomeSpan/HomeSpan@2.1.5
    h2zero/NimBLE-Arduino@^2
monitor_speed = 115200
board_build.partitions = partitions.csv
upload_speed = 921600
extra_scripts = pre:scripts/pre_build.py

; ── M5Stack NanoC6 (ESP32-C6) — default ──────────────────────────────────────
; To create a branded build, add [env:nanoc6-mybrand] in
; platformio_override.ini (gitignored) with -DBRAND_* flags.
; See include/branding.h for available branding variables.
; See include/boards/ for available board profiles.
[env:nanoc6]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.20/platform-espressif32.zip
board = esp32-c6-devkitm-1
extends = common
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DBOARD_PROFILE_NANOC6

; ── Generic ESP32 DevKit v1 ──────────────────────────────────────────────────
[env:esp32-devkit]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.20/platform-espressif32.zip
board = esp32dev
extends = common
build_flags =
    -DBOARD_PROFILE_ESP32_DEVKIT

; ── ESP32-S3-DevKitC-1 ──────────────────────────────────────────────────────
[env:esp32s3-devkit]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.20/platform-espressif32.zip
board = esp32-s3-devkitc-1
extends = common
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DBOARD_PROFILE_ESP32S3_DEVKIT

; ── ESP32-C3 SuperMini / XIAO ───────────────────────────────────────────────
[env:esp32c3-mini]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.20/platform-espressif32.zip
board = esp32-c3-devkitm-1
extends = common
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DBOARD_PROFILE_ESP32C3_MINI

; ── M5Stack AtomS3 Lite ─────────────────────────────────────────────────────
[env:m5atoms3-lite]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/54.03.20/platform-espressif32.zip
board = m5stack-atoms3
extends = common
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DBOARD_PROFILE_M5ATOMS3_LITE

; ── Native (desktop) test environment ──────────────────────────────────────
[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_flags =
    -DUNIT_TEST
    -DBOARD_PROFILE_CUSTOM
    -DUART_NEEDS_RX_PULLUP=0
    -DUART_USE_XTAL_CLK=0
    -DUSE_HWCDC_DEBUG=0
    -DPIN_LED_DATA=-1
    -DPIN_LED_ENABLE=-1
    -DPIN_BUTTON=-1
    -DCN105_UART_NUM=0
    -DPIN_CN105_RX=0
    -DPIN_CN105_TX=0
    -Itest/stubs
    -Iinclude
    -std=c++17
build_src_filter = -<*> +<cn105_protocol.cpp> +<status_led.cpp>
lib_extra_dirs = test
lib_ldf_mode = deep+
